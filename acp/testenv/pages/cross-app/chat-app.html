<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T11 聊天应用 - ACP TestEnv</title>
  <link rel="stylesheet" href="../../static/style.css">
  <style>
    html, body { height: 100%; }
    body { display: flex; flex-direction: column; }

    .chat-header {
      background: white; border-bottom: 1px solid var(--border);
      padding: 14px 20px; display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .chat-header-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 14px;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-weight: 600; font-size: 15px; }
    .chat-header-status { font-size: 12px; color: var(--success); }

    .message-list {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .msg {
      display: flex; gap: 8px; max-width: 75%;
    }
    .msg.incoming { align-self: flex-start; }
    .msg.outgoing { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
    }
    .msg.incoming .msg-avatar { background: #ede9fe; color: #5b21b6; }
    .msg.outgoing .msg-avatar { background: #dcfce7; color: #166534; }

    .msg-bubble {
      padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6;
    }
    .msg.incoming .msg-bubble {
      background: white; border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }
    .msg.outgoing .msg-bubble {
      background: var(--primary); color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; text-align: right; }
    .msg.outgoing .msg-time { color: rgba(255,255,255,0.7); }

    .chat-input-area {
      background: white; border-top: 1px solid var(--border);
      padding: 12px 16px; display: flex; gap: 8px; align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: 20px; font-size: 14px; outline: none; resize: none;
      font-family: inherit; max-height: 100px; min-height: 40px;
      line-height: 1.5; background: var(--bg); transition: border-color 0.15s;
    }
    .chat-input:focus { border-color: var(--primary); background: white; }

    .paste-btn {
      flex-shrink: 0; border-radius: 20px; padding: 8px 14px;
      font-size: 13px;
    }
    .send-btn {
      flex-shrink: 0; border-radius: 50%; width: 40px; height: 40px; padding: 0;
    }
    .send-btn svg { width: 18px; height: 18px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-muted); text-decoration: none;
    }
    .back-link:hover { color: var(--primary); }

    /* 粘贴失败提示 */
    .paste-error {
      font-size: 11px; color: var(--danger); text-align: center;
      padding: 4px 0; display: none;
    }
    .paste-error.visible { display: block; }
  </style>
</head>
<body>

  <div class="chat-header">
    <div class="chat-header-avatar">A</div>
    <div class="chat-header-info">
      <div class="chat-header-name" data-acp-type="text" data-acp-id="chat-partner-name">ACP 助手</div>
      <div class="chat-header-status">在线</div>
    </div>
    <a href="../../index.html" class="back-link" data-acp-type="link" data-acp-id="back-to-index">
      返回首页
    </a>
  </div>

  <div id="message-list" class="message-list"
       data-acp-type="list" data-acp-id="message-list">

    <!-- 初始欢迎消息 -->
    <div class="msg incoming" data-acp-type="message" data-acp-id="msg-1">
      <div class="msg-avatar">A</div>
      <div>
        <div class="msg-bubble">你好！我是 ACP 助手，请问有什么可以帮您？</div>
        <div class="msg-time">09:00</div>
      </div>
    </div>

    <div class="msg incoming" data-acp-type="message" data-acp-id="msg-2">
      <div class="msg-avatar">A</div>
      <div>
        <div class="msg-bubble">你可以从笔记应用复制内容，然后粘贴到这里发送给我。</div>
        <div class="msg-time">09:00</div>
      </div>
    </div>

  </div>

  <div id="paste-error" class="paste-error">
    剪贴板读取失败，请手动粘贴（Ctrl+V / Cmd+V）
  </div>

  <div class="chat-input-area">
    <textarea id="chat-input" class="chat-input" rows="1"
              placeholder="输入消息..."
              data-acp-type="input" data-acp-id="chat-input"
              onkeydown="handleInputKey(event)"
              oninput="autoResize(this)"></textarea>

    <button id="paste-btn" class="btn btn-secondary paste-btn"
            data-acp-type="button" data-acp-id="paste-btn"
            onclick="pasteFromClipboard()">
      粘贴
    </button>

    <button id="send-btn" class="btn btn-primary send-btn"
            data-acp-type="button" data-acp-id="send-btn"
            onclick="sendMessage()"
            aria-label="发送">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <script>
    var msgCounter = 3;

    function getNow() {
      var d = new Date();
      return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }

    function appendMessage(text, type) {
      var list = document.getElementById('message-list');
      var id = 'msg-' + msgCounter++;

      var div = document.createElement('div');
      div.className = 'msg ' + type;
      div.setAttribute('data-acp-type', 'message');
      div.setAttribute('data-acp-id', id);

      var initial = type === 'outgoing' ? '我' : 'A';
      div.innerHTML =
        '<div class="msg-avatar">' + initial + '</div>' +
        '<div>' +
          '<div class="msg-bubble">' + escapeHtml(text) + '</div>' +
          '<div class="msg-time">' + getNow() + '</div>' +
        '</div>';

      list.appendChild(div);
      list.scrollTop = list.scrollHeight;
      return id;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;');
    }

    function sendMessage() {
      var input = document.getElementById('chat-input');
      var text = input.value.trim();
      if (!text) return;

      appendMessage(text, 'outgoing');
      input.value = '';
      input.style.height = '';

      // 简单回复
      setTimeout(function() {
        appendMessage('收到，已记录：「' + text.slice(0, 30) + (text.length > 30 ? '...' : '') + '」', 'incoming');
      }, 600);
    }

    function handleInputKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = '';
      el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

    function pasteFromClipboard() {
      var errEl = document.getElementById('paste-error');
      errEl.classList.remove('visible');

      if (navigator.clipboard && navigator.clipboard.readText) {
        navigator.clipboard.readText().then(function(text) {
          var input = document.getElementById('chat-input');
          input.value = text;
          input.focus();
          autoResize(input);
        }).catch(function() {
          errEl.classList.add('visible');
        });
      } else {
        errEl.classList.add('visible');
      }
    }
  </script>
</body>
</html>
