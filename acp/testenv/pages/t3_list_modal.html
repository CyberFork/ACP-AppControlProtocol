<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T3 列表+弹窗 - ACP TestEnv</title>
  <link rel="stylesheet" href="../static/style.css">
  <style>
    .main { max-width: 680px; margin: 0 auto; padding: 24px; }
    .list-container { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: white; }
    .list-item {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s;
      user-select: none;
    }
    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: var(--bg); }
    .list-item.selected { background: #ede9fe; }
    .item-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: white; flex-shrink: 0; }
    .item-body { flex: 1; min-width: 0; }
    .item-title { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
    .item-desc { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { font-size: 12px; color: var(--text-muted); flex-shrink: 0; text-align: right; }
    .accordion-body { padding: 0 16px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s; background: #f8fafc; }
    .accordion-body.open { max-height: 200px; padding: 12px 16px; }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>T3 列表 + 弹窗</h1>
    <span class="coverage">E21, E29-E31, E33 / A01, A03, A09</span>
  </div>

  <!-- Notification Banner (E33, dismissable) -->
  <div id="info-banner" class="notification-banner success"
       data-acp-type="notification-banner" data-acp-id="info-banner"
       style="margin: 16px 24px 0; max-width: 680px; margin-left: auto; margin-right: auto;">
    <span>✓ 提示：长按列表项可弹出操作菜单，点击条目查看详情</span>
    <button class="btn btn-ghost btn-sm" onclick="dismissBanner(this.parentElement)"
            data-acp-type="button" data-acp-id="close-info-banner">✕</button>
  </div>

  <div class="main">
    <!-- Filter bar -->
    <div class="flex items-center justify-between mb-4">
      <h2 style="font-size:16px;font-weight:600;">联系人列表</h2>
      <div class="flex gap-2">
        <!-- Tooltip demo (E31) -->
        <div class="tooltip-wrapper">
          <button class="btn btn-secondary btn-sm" data-acp-type="button" data-acp-id="sort-btn">↕ 排序</button>
          <span class="tooltip-text">按名字排序</span>
        </div>
        <button class="btn btn-primary btn-sm" data-acp-type="button" data-acp-id="add-contact"
                onclick="openModal('modal-add')">+ 新建</button>
      </div>
    </div>

    <!-- Scrollable List (E21, A09 scroll, A03 long press) -->
    <div class="list-container" id="contact-list" data-acp-type="list" data-acp-id="contact-list">
      <!-- Generated by JS -->
    </div>

    <!-- Accordion (fold/unfold area) -->
    <div class="card mt-4">
      <div class="flex items-center justify-between" style="cursor:pointer;"
           onclick="toggleAccordion()"
           data-acp-type="accordion-header" data-acp-id="acc-header">
        <span style="font-weight:600;">折叠面板 - 快捷操作</span>
        <span id="acc-icon">▼</span>
      </div>
      <div class="accordion-body" id="acc-body" data-acp-type="accordion-body" data-acp-id="acc-body">
        <div class="flex gap-2 flex-wrap mt-2">
          <button class="btn btn-secondary btn-sm" data-acp-type="button" onclick="Toast.info('已全选')">全选</button>
          <button class="btn btn-secondary btn-sm" data-acp-type="button" onclick="Toast.info('已批量删除')">批量删除</button>
          <button class="btn btn-secondary btn-sm" data-acp-type="button" onclick="Toast.info('已导出')">导出 CSV</button>
          <button class="btn btn-secondary btn-sm" data-acp-type="button" onclick="Toast.info('已发送邮件')">群发邮件</button>
        </div>
        <p class="text-muted text-sm mt-2">选中 0 个联系人</p>
      </div>
    </div>
  </div>

  <!-- Detail Modal (E29) -->
  <div class="modal-overlay" id="modal-detail" data-acp-type="modal" data-acp-id="modal-detail">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-detail-title">联系人详情</div>
        <button class="modal-close" data-acp-type="button" data-acp-id="modal-close">✕</button>
      </div>
      <div id="modal-detail-content" style="padding: 8px 0;"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-detail')"
                data-acp-type="button" data-acp-id="modal-cancel">取消</button>
        <button class="btn btn-primary" onclick="closeModal('modal-detail');Toast.success('已保存')"
                data-acp-type="button" data-acp-id="modal-confirm">确认</button>
      </div>
    </div>
  </div>

  <!-- Add Contact Modal -->
  <div class="modal-overlay" id="modal-add" data-acp-type="modal" data-acp-id="modal-add">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">新建联系人</div>
        <button class="modal-close" data-acp-type="button">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">姓名</label>
        <input type="text" class="form-input" placeholder="输入姓名"
               data-acp-type="input" data-acp-id="new-contact-name">
      </div>
      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input type="email" class="form-input" placeholder="输入邮箱"
               data-acp-type="input" data-acp-id="new-contact-email">
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-add')"
                data-acp-type="button">取消</button>
        <button class="btn btn-primary" onclick="closeModal('modal-add');Toast.success('联系人已添加')"
                data-acp-type="button" data-acp-id="confirm-add">添加</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="modal-delete" data-acp-type="modal" data-acp-id="modal-delete">
    <div class="modal" style="max-width:360px;">
      <div class="modal-header">
        <div class="modal-title" style="color:var(--danger);">⚠ 确认删除</div>
        <button class="modal-close" data-acp-type="button">✕</button>
      </div>
      <p style="margin-bottom:4px;">你确定要删除 <strong id="delete-target-name">该联系人</strong> 吗？</p>
      <p class="text-muted text-sm">此操作不可撤销。</p>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('modal-delete')"
                data-acp-type="button" data-acp-id="cancel-delete">取消</button>
        <button class="btn btn-danger" id="confirm-delete-btn"
                data-acp-type="button" data-acp-id="confirm-delete">删除</button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="../static/testenv.js"></script>
  <script src="../auto_label.js"></script>
  <script>
    const contacts = [
      {id:1, name:'张明', role:'产品经理', email:'zhang@example.com', phone:'138-0001-0001', dept:'产品', color:'#4f46e5'},
      {id:2, name:'李婷', role:'UI 设计师', email:'li@example.com', phone:'139-0002-0002', dept:'设计', color:'#7c3aed'},
      {id:3, name:'王刚', role:'前端工程师', email:'wang@example.com', phone:'137-0003-0003', dept:'技术', color:'#059669'},
      {id:4, name:'赵雪', role:'后端工程师', email:'zhao@example.com', phone:'136-0004-0004', dept:'技术', color:'#dc2626'},
      {id:5, name:'陈磊', role:'数据分析', email:'chen@example.com', phone:'135-0005-0005', dept:'数据', color:'#d97706'},
      {id:6, name:'刘芳', role:'项目经理', email:'liu@example.com', phone:'134-0006-0006', dept:'PMO', color:'#0891b2'},
      {id:7, name:'孙洋', role:'测试工程师', email:'sun@example.com', phone:'133-0007-0007', dept:'测试', color:'#be185d'},
      {id:8, name:'周伟', role:'运营专员', email:'zhou@example.com', phone:'132-0008-0008', dept:'运营', color:'#7c3aed'},
      {id:9, name:'吴丽', role:'内容编辑', email:'wu@example.com', phone:'131-0009-0009', dept:'内容', color:'#16a34a'},
      {id:10, name:'郑强', role:'销售顾问', email:'zheng@example.com', phone:'130-0010-0010', dept:'销售', color:'#ea580c'},
      {id:11, name:'黄晓', role:'法务专员', email:'huang@example.com', phone:'189-0011-0011', dept:'法务', color:'#6d28d9'},
      {id:12, name:'杨帆', role:'HR', email:'yang@example.com', phone:'188-0012-0012', dept:'人事', color:'#0369a1'},
      {id:13, name:'林静', role:'财务', email:'lin@example.com', phone:'187-0013-0013', dept:'财务', color:'#047857'},
      {id:14, name:'马超', role:'架构师', email:'ma@example.com', phone:'186-0014-0014', dept:'技术', color:'#b91c1c'},
      {id:15, name:'何梅', role:'客服', email:'he@example.com', phone:'185-0015-0015', dept:'服务', color:'#c2410c'},
      {id:16, name:'罗亮', role:'安全工程师', email:'luo@example.com', phone:'184-0016-0016', dept:'安全', color:'#7e22ce'},
      {id:17, name:'高峰', role:'BI工程师', email:'gao@example.com', phone:'183-0017-0017', dept:'数据', color:'#065f46'},
      {id:18, name:'谢明', role:'算法工程师', email:'xie@example.com', phone:'182-0018-0018', dept:'AI', color:'#1e40af'},
      {id:19, name:'唐丽', role:'产品专员', email:'tang@example.com', phone:'181-0019-0019', dept:'产品', color:'#9d174d'},
      {id:20, name:'韩宇', role:'DevOps', email:'han@example.com', phone:'180-0020-0020', dept:'技术', color:'#1d4ed8'},
    ];
    let displayedContacts = [...contacts];

    function renderList() {
      const list = document.getElementById('contact-list');
      list.innerHTML = '';
      displayedContacts.forEach(c => {
        const item = document.createElement('div');
        item.className = 'list-item';
        item.setAttribute('data-acp-type', 'list-item');
        item.setAttribute('data-acp-id', `contact-${c.id}`);
        item.innerHTML = `
          <div class="item-avatar" style="background:${c.color}">${c.name[0]}</div>
          <div class="item-body">
            <div class="item-title">${c.name}</div>
            <div class="item-desc">${c.role} · ${c.email}</div>
          </div>
          <div class="item-meta">
            <div>${c.dept}</div>
            <div style="color:${c.color};font-size:10px;margin-top:2px;">●</div>
          </div>
        `;
        // Click → open modal (A01)
        item.addEventListener('click', () => showDetail(c));
        // Long press → context menu (A03)
        addLongPress(item, (e) => {
          showContextMenu(e.clientX, e.clientY, [
            { label: '查看详情', icon: '👁', action: () => showDetail(c) },
            { label: '编辑', icon: '✏️', action: () => { Toast.info(`编辑 ${c.name}`); } },
            'sep',
            { label: '删除', icon: '🗑', danger: true, action: () => showDeleteConfirm(c) }
          ]);
        });
        list.appendChild(item);
      });
    }
    renderList();

    function showDetail(c) {
      document.getElementById('modal-detail-title').textContent = c.name + ' 的详情';
      document.getElementById('modal-detail-content').innerHTML = `
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
          <div class="item-avatar" style="background:${c.color};width:56px;height:56px;font-size:22px;">${c.name[0]}</div>
          <div>
            <div style="font-size:18px;font-weight:700;">${c.name}</div>
            <div class="text-muted">${c.role}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div><div class="text-muted text-sm">邮箱</div><div>${c.email}</div></div>
          <div><div class="text-muted text-sm">电话</div><div>${c.phone}</div></div>
          <div><div class="text-muted text-sm">部门</div><div>${c.dept}</div></div>
          <div><div class="text-muted text-sm">ID</div><div>#${c.id}</div></div>
        </div>
      `;
      openModal('modal-detail');
    }

    function showDeleteConfirm(c) {
      document.getElementById('delete-target-name').textContent = c.name;
      document.getElementById('confirm-delete-btn').onclick = () => {
        displayedContacts = displayedContacts.filter(x => x.id !== c.id);
        renderList();
        closeModal('modal-delete');
        Toast.success(`已删除 ${c.name}`);
      };
      openModal('modal-delete');
    }

    let accOpen = false;
    function toggleAccordion() {
      accOpen = !accOpen;
      document.getElementById('acc-body').classList.toggle('open', accOpen);
      document.getElementById('acc-icon').textContent = accOpen ? '▲' : '▼';
    }

    function dismissBanner(el) {
      el.style.opacity = '0'; el.style.transform = 'translateY(-10px)';
      el.style.transition = 'all 0.2s';
      setTimeout(() => el.remove(), 200);
    }
  </script>
</body>
</html>
