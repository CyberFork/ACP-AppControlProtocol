<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T2 数据Dashboard - ACP TestEnv</title>
  <link rel="stylesheet" href="../static/style.css">
  <style>
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 200px; background: #1e1b4b; color: white; padding: 24px 16px; flex-shrink: 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .sidebar-logo { font-size: 20px; font-weight: 800; color: #a78bfa; margin-bottom: 24px; }
    .sidebar-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: 8px; cursor: pointer; font-size: 14px; color: rgba(255,255,255,0.7);
      margin-bottom: 4px; transition: all 0.15s;
    }
    .sidebar-item:hover { background: rgba(255,255,255,0.1); color: white; }
    .sidebar-item.active { background: var(--primary); color: white; }
    .content { flex: 1; padding: 24px; overflow: auto; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    @media (max-width: 900px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .sidebar { display: none; } }
    .stat-card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .stat-card-num { font-size: 28px; font-weight: 800; color: var(--primary); }
    .stat-card-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .stat-card-change { font-size: 12px; margin-top: 6px; }
    .change-up { color: var(--success); }
    .change-down { color: var(--danger); }

    /* CSS Bar Chart (E27) */
    .bar-chart { display: flex; align-items: flex-end; gap: 12px; height: 120px; padding: 0 8px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar-fill { width: 100%; background: var(--primary); border-radius: 4px 4px 0 0; transition: height 0.5s ease; min-height: 4px; }
    .bar-label { font-size: 11px; color: var(--text-muted); }
    .bar-val { font-size: 11px; font-weight: 600; color: var(--primary); }

    /* Table sort indicators */
    .sort-icon { margin-left: 4px; color: var(--text-muted); }
    .sort-asc .sort-icon::after { content: ' ↑'; }
    .sort-desc .sort-icon::after { content: ' ↓'; }

    /* Loading skeleton rows */
    .sk-row { display: flex; gap: 12px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .sk-cell { height: 16px; border-radius: 4px; }
  </style>
</head>
<body>
  <div style="background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;">
    <h1 style="font-size: 18px; font-weight: 700; color: var(--primary);">T2 数据 Dashboard</h1>
    <span style="font-size: 12px; color: var(--text-muted);">E11, E17, E22, E23, E27 / A01, A05, A09</span>
  </div>

  <div class="layout">
    <!-- Sidebar (E14, L09) -->
    <div class="sidebar" data-acp-type="sidebar" data-acp-id="main-sidebar">
      <div class="sidebar-logo">ACP 管理台</div>
      <div class="sidebar-item active" data-acp-type="nav-item" data-acp-id="nav-dashboard" onclick="activeSidebar(this)">📊 仪表盘</div>
      <div class="sidebar-item" data-acp-type="nav-item" data-acp-id="nav-users" onclick="activeSidebar(this)">👥 用户</div>
      <div class="sidebar-item" data-acp-type="nav-item" data-acp-id="nav-orders" onclick="activeSidebar(this)">📦 订单</div>
      <div class="sidebar-item" data-acp-type="nav-item" data-acp-id="nav-reports" onclick="activeSidebar(this)">📈 报表</div>
      <div class="sidebar-item" data-acp-type="nav-item" data-acp-id="nav-settings" onclick="activeSidebar(this)">⚙️ 设置</div>
    </div>

    <div class="content">
      <!-- Tabs (E11, S04) -->
      <div class="tabs-wrapper">
        <div class="tabs" data-acp-type="tabs" data-acp-id="main-tabs">
          <button class="tab-btn active" data-tab="tab-overview" data-acp-type="tab" data-acp-id="tab-btn-overview" onclick="switchTab(this, 'tab-overview')">概览</button>
          <button class="tab-btn" data-tab="tab-users" data-acp-type="tab" data-acp-id="tab-btn-users" onclick="switchTab(this, 'tab-users')">用户列表</button>
          <button class="tab-btn" data-tab="tab-orders" data-acp-type="tab" data-acp-id="tab-btn-orders" onclick="switchTab(this, 'tab-orders')">订单管理</button>
          <button class="tab-btn" data-tab="tab-empty" data-acp-type="tab" data-acp-id="tab-btn-empty" onclick="switchTab(this, 'tab-empty')">归档</button>
        </div>

        <!-- Tab: Overview -->
        <div id="tab-overview" class="tab-content active">
          <!-- Stats Cards (E22) -->
          <div class="stats-grid">
            <div class="stat-card" data-acp-type="card" data-acp-id="stat-users">
              <div class="stat-card-num">12,847</div>
              <div class="stat-card-label">总用户数</div>
              <div class="stat-card-change change-up">↑ 8.2% 较上月</div>
            </div>
            <div class="stat-card" data-acp-type="card" data-acp-id="stat-orders">
              <div class="stat-card-num">3,291</div>
              <div class="stat-card-label">本月订单</div>
              <div class="stat-card-change change-up">↑ 12.5% 较上月</div>
            </div>
            <div class="stat-card" data-acp-type="card" data-acp-id="stat-revenue">
              <div class="stat-card-num">¥482K</div>
              <div class="stat-card-label">本月收入</div>
              <div class="stat-card-change change-down">↓ 2.1% 较上月</div>
            </div>
            <div class="stat-card" data-acp-type="card" data-acp-id="stat-active">
              <div class="stat-card-num">1,034</div>
              <div class="stat-card-label">今日活跃</div>
              <div class="stat-card-change change-up">↑ 5.0% 较昨日</div>
            </div>
          </div>

          <!-- Bar Chart (E27) -->
          <div class="card mb-4">
            <div class="card-header">近7日订单量（CSS 图表）</div>
            <div class="bar-chart" id="bar-chart" data-acp-type="chart" data-acp-id="weekly-chart">
            </div>
          </div>

          <!-- Simple data table with sort + hover -->
          <div class="card">
            <div class="flex items-center justify-between mb-4">
              <div class="card-header" style="margin:0">近期活动</div>
              <button class="btn btn-secondary btn-sm" data-acp-type="button" data-acp-id="refresh-activity" onclick="Toast.info('已刷新')">刷新</button>
            </div>
            <div class="table-container">
              <table class="table" id="activity-table" data-acp-type="table" data-acp-id="activity-table">
                <thead>
                  <tr>
                    <th onclick="sortTable('activity-table',0)" data-acp-type="table-header" data-acp-id="th-user">用户<span class="sort-icon"></span></th>
                    <th onclick="sortTable('activity-table',1)" data-acp-type="table-header" data-acp-id="th-action">操作<span class="sort-icon"></span></th>
                    <th onclick="sortTable('activity-table',2)" data-acp-type="table-header" data-acp-id="th-time">时间<span class="sort-icon"></span></th>
                    <th data-acp-type="table-header" data-acp-id="th-status">状态</th>
                  </tr>
                </thead>
                <tbody id="activity-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Tab: Users -->
        <div id="tab-users" class="tab-content">
          <div class="card">
            <div class="flex items-center justify-between mb-4">
              <div class="card-header" style="margin:0">用户列表</div>
              <div class="flex gap-2">
                <input type="text" class="form-input" placeholder="搜索用户..." style="width:200px"
                       data-acp-type="input" data-acp-id="user-search"
                       oninput="filterUsers(this.value)">
                <button class="btn btn-primary btn-sm" data-acp-type="button" data-acp-id="add-user" onclick="Toast.success('添加用户')">+ 添加</button>
              </div>
            </div>
            <div class="table-container">
              <table class="table" id="users-table" data-acp-type="table" data-acp-id="users-table">
                <thead>
                  <tr>
                    <th onclick="sortTable('users-table',0)" data-acp-type="table-header">ID<span class="sort-icon"></span></th>
                    <th onclick="sortTable('users-table',1)" data-acp-type="table-header">姓名<span class="sort-icon"></span></th>
                    <th onclick="sortTable('users-table',2)" data-acp-type="table-header">邮箱<span class="sort-icon"></span></th>
                    <th onclick="sortTable('users-table',3)" data-acp-type="table-header">角色<span class="sort-icon"></span></th>
                    <th onclick="sortTable('users-table',4)" data-acp-type="table-header">状态<span class="sort-icon"></span></th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="users-tbody"></tbody>
              </table>
            </div>
            <!-- Pagination (E17) -->
            <div class="pagination" id="user-pagination" data-acp-type="pagination" data-acp-id="user-pagination"></div>
          </div>
        </div>

        <!-- Tab: Orders -->
        <div id="tab-orders" class="tab-content">
          <div class="card">
            <div class="card-header">订单管理</div>
            <div class="table-container">
              <table class="table" id="orders-table" data-acp-type="table" data-acp-id="orders-table">
                <thead>
                  <tr>
                    <th onclick="sortTable('orders-table',0)" data-acp-type="table-header">订单号<span class="sort-icon"></span></th>
                    <th onclick="sortTable('orders-table',1)" data-acp-type="table-header">商品<span class="sort-icon"></span></th>
                    <th onclick="sortTable('orders-table',2)" data-acp-type="table-header">金额<span class="sort-icon"></span></th>
                    <th onclick="sortTable('orders-table',3)" data-acp-type="table-header">状态<span class="sort-icon"></span></th>
                    <th onclick="sortTable('orders-table',4)" data-acp-type="table-header">日期<span class="sort-icon"></span></th>
                  </tr>
                </thead>
                <tbody id="orders-tbody"></tbody>
              </table>
            </div>
            <div class="pagination" id="order-pagination" data-acp-type="pagination" data-acp-id="order-pagination"></div>
          </div>
          <!-- Infinite Scroll demo (S13) -->
          <div id="infinite-scroll-demo" class="card mt-4">
            <div class="card-header">无限滚动演示 (S13)</div>
            <div id="scroll-list" style="height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:8px;"
                 data-acp-type="scroll-container" data-acp-id="infinite-scroll">
            </div>
            <div id="scroll-loading" style="display:none;padding:12px;text-align:center;">
              <div class="spinner" style="margin:0 auto"></div>
            </div>
          </div>
        </div>

        <!-- Tab: Empty State (S17) -->
        <div id="tab-empty" class="tab-content">
          <div class="empty-state" data-acp-type="empty-state" data-acp-id="empty-archive">
            <div class="empty-state-icon">📭</div>
            <div class="empty-state-title">暂无归档数据</div>
            <p class="text-muted" style="margin-bottom:16px">归档的记录将在这里显示</p>
            <button class="btn btn-primary" data-acp-type="button" data-acp-id="create-archive" onclick="Toast.info('开始归档')">创建归档</button>
          </div>
        </div>
      </div>
    </div><!-- .content -->
  </div><!-- .layout -->

  <div class="toast-container"></div>

  <script src="../static/testenv.js"></script>
  <script src="../auto_label.js"></script>
  <script>
    function activeSidebar(el) {
      document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
    }

    function switchTab(btn, tabId) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    // Sort table
    const sortState = {};
    function sortTable(tableId, col) {
      const key = tableId + '_' + col;
      sortState[key] = sortState[key] === 'asc' ? 'desc' : 'asc';
      const tbody = document.querySelector('#' + tableId + ' tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a, b) => {
        const av = a.cells[col]?.textContent.trim() || '';
        const bv = b.cells[col]?.textContent.trim() || '';
        const cmp = av.localeCompare(bv, 'zh', { numeric: true });
        return sortState[key] === 'asc' ? cmp : -cmp;
      });
      rows.forEach(r => tbody.appendChild(r));
      // Update header icons
      const ths = document.querySelectorAll('#' + tableId + ' th');
      ths.forEach((th, i) => {
        th.className = th.className.replace(/ sort-asc| sort-desc/g, '');
        if (i === col) th.classList.add('sort-' + sortState[key]);
      });
    }

    // Bar chart data
    const barData = [
      { day: '周一', val: 42 }, { day: '周二', val: 78 }, { day: '周三', val: 55 },
      { day: '周四', val: 91 }, { day: '周五', val: 83 }, { day: '周六', val: 67 },
      { day: '周日', val: 49 }
    ];
    const maxVal = Math.max(...barData.map(d => d.val));
    const barChart = document.getElementById('bar-chart');
    barData.forEach(d => {
      const h = Math.round((d.val / maxVal) * 100);
      barChart.innerHTML += `
        <div class="bar-col">
          <div class="bar-val">${d.val}</div>
          <div class="bar-fill" style="height:${h}px" data-acp-type="chart-bar" data-acp-id="bar-${d.day}"></div>
          <div class="bar-label">${d.day}</div>
        </div>`;
    });

    // Activity table
    const activities = [
      ['张三', '创建订单 #10023', '2分钟前', 'success'],
      ['李四', '修改用户信息', '5分钟前', 'info'],
      ['王五', '删除商品 SKU-501', '12分钟前', 'warning'],
      ['赵六', '登录失败', '18分钟前', 'error'],
      ['田七', '导出报表', '25分钟前', 'success'],
      ['陈八', '修改权限', '1小时前', 'info'],
    ];
    const actBody = document.getElementById('activity-tbody');
    activities.forEach(([user,action,time,type]) => {
      const badgeMap = {success:'badge-green', info:'badge-blue', warning:'badge-yellow', error:'badge-red'};
      const labelMap = {success:'成功', info:'信息', warning:'警告', error:'失败'};
      actBody.innerHTML += `<tr data-acp-type="table-row">
        <td><div class="flex items-center gap-2">
          <div class="avatar" style="background:var(--primary);width:28px;height:28px;font-size:12px;">${user[0]}</div>${user}
        </div></td>
        <td>${action}</td>
        <td class="text-muted">${time}</td>
        <td><span class="badge ${badgeMap[type]}">${labelMap[type]}</span></td>
      </tr>`;
    });

    // Users table with pagination
    const users = Array.from({length: 25}, (_, i) => ({
      id: i+1,
      name: ['张三','李四','王五','赵六','田七','陈八','刘九','孙十','周一','吴二'][i%10] + (i > 9 ? i : ''),
      email: `user${i+1}@example.com`,
      role: ['管理员','编辑','查看者','访客'][i%4],
      status: i%5 === 3 ? '禁用' : '活跃'
    }));
    let currentUserPage = 1, usersPerPage = 6;
    let filteredUsers = [...users];

    function renderUsers() {
      const start = (currentUserPage-1)*usersPerPage;
      const page = filteredUsers.slice(start, start+usersPerPage);
      const tbody = document.getElementById('users-tbody');
      tbody.innerHTML = page.map(u => `
        <tr data-acp-type="table-row" data-acp-id="user-row-${u.id}">
          <td>#${u.id}</td><td>${u.name}</td><td class="text-muted">${u.email}</td>
          <td><span class="badge badge-blue">${u.role}</span></td>
          <td><span class="badge ${u.status==='活跃'?'badge-green':'badge-red'}">${u.status}</span></td>
          <td>
            <button class="btn btn-ghost btn-sm" data-acp-type="button" onclick="Toast.info('编辑 ${u.name}')">编辑</button>
            <button class="btn btn-ghost btn-sm" style="color:var(--danger)" data-acp-type="button" onclick="Toast.warning('删除 ${u.name}')">删除</button>
          </td>
        </tr>`).join('');
      renderPagination('user-pagination', currentUserPage, Math.ceil(filteredUsers.length/usersPerPage), p => { currentUserPage = p; renderUsers(); });
    }

    function filterUsers(val) {
      filteredUsers = users.filter(u => u.name.includes(val) || u.email.includes(val));
      currentUserPage = 1;
      renderUsers();
    }

    function renderPagination(id, cur, total, onClick) {
      const el = document.getElementById(id);
      let html = '';
      for (let i = 1; i <= total; i++) {
        html += `<div class="page-btn${i===cur?' active':''}" data-acp-type="page-btn" data-acp-id="${id}-${i}" onclick="(${onClick})(${i})">${i}</div>`;
      }
      el.innerHTML = html;
    }
    renderUsers();

    // Orders table
    const statuses = ['待支付','已支付','已发货','已完成','已取消'];
    const products = ['AirPods Pro','MacBook Air','iPhone 15','iPad Mini','Apple Watch'];
    const orders = Array.from({length: 15}, (_, i) => ({
      id: `ORD-${10000+i}`,
      product: products[i%5],
      amount: `¥${(Math.random()*5000+200).toFixed(0)}`,
      status: statuses[i%5],
      date: `2026-04-${String(i+1).padStart(2,'0')}`
    }));
    let currentOrderPage = 1, ordersPerPage = 6;
    function renderOrders() {
      const start = (currentOrderPage-1)*ordersPerPage;
      const page = orders.slice(start, start+ordersPerPage);
      const tbody = document.getElementById('orders-tbody');
      const colorMap = {'待支付':'badge-yellow','已支付':'badge-blue','已发货':'badge-blue','已完成':'badge-green','已取消':'badge-red'};
      tbody.innerHTML = page.map(o => `
        <tr data-acp-type="table-row" data-acp-id="order-row-${o.id}">
          <td style="font-family:monospace">${o.id}</td>
          <td>${o.product}</td>
          <td style="font-weight:600">${o.amount}</td>
          <td><span class="badge ${colorMap[o.status]}">${o.status}</span></td>
          <td class="text-muted">${o.date}</td>
        </tr>`).join('');
      renderPagination('order-pagination', currentOrderPage, Math.ceil(orders.length/ordersPerPage), p => { currentOrderPage = p; renderOrders(); });
    }
    renderOrders();

    // Infinite scroll demo
    const scrollList = document.getElementById('scroll-list');
    let scrollPage = 0;
    function loadMoreItems() {
      return new Promise(resolve => {
        setTimeout(() => {
          for (let i = 0; i < 5; i++) {
            const num = scrollPage * 5 + i + 1;
            const item = document.createElement('div');
            item.style.cssText = 'padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;';
            item.setAttribute('data-acp-type', 'list-item');
            item.setAttribute('data-acp-id', `scroll-item-${num}`);
            item.textContent = `动态记录 #${num} - ${new Date().toLocaleTimeString()}`;
            scrollList.appendChild(item);
          }
          scrollPage++;
          resolve();
        }, 600);
      });
    }
    loadMoreItems();
    scrollList.addEventListener('scroll', async () => {
      if (scrollList.scrollTop + scrollList.clientHeight >= scrollList.scrollHeight - 20) {
        document.getElementById('scroll-loading').style.display = 'block';
        await loadMoreItems();
        document.getElementById('scroll-loading').style.display = 'none';
      }
    });
  </script>
</body>
</html>
